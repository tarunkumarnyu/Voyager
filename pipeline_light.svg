<svg width="1360" height="1280" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
</style>

<!-- OFFLINE SECTION container -->
<rect x="40" y="24" width="600" height="108" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th" x="56" y="48" fill="#2C2C2A">Offline: map building</text>

<!-- Offline boxes -->
<rect x="56" y="62" width="108" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="110" y="84" text-anchor="middle" dominant-baseline="central" fill="#085041">Maze images</text>

<rect x="186" y="62" width="86" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="229" y="84" text-anchor="middle" dominant-baseline="central" fill="#085041">CosPlace</text>

<rect x="294" y="62" width="86" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="337" y="84" text-anchor="middle" dominant-baseline="central" fill="#085041">Top-5 NN</text>

<rect x="402" y="62" width="98" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="451" y="84" text-anchor="middle" dominant-baseline="central" fill="#085041">SuperGlue</text>

<rect x="522" y="62" width="104" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="574" y="84" text-anchor="middle" dominant-baseline="central" fill="#085041">Topo graph</text>

<!-- Offline arrows -->
<line x1="164" y1="84" x2="184" y2="84" class="arr" marker-end="url(#arrow)"/>
<line x1="272" y1="84" x2="292" y2="84" class="arr" marker-end="url(#arrow)"/>
<line x1="380" y1="84" x2="400" y2="84" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="84" x2="520" y2="84" class="arr" marker-end="url(#arrow)"/>

<!-- Offline subtitles -->
<text class="ts" x="110" y="120" text-anchor="middle">capture</text>
<text class="ts" x="229" y="120" text-anchor="middle">embed</text>
<text class="ts" x="337" y="120" text-anchor="middle">retrieve</text>
<text class="ts" x="451" y="120" text-anchor="middle">verify</text>
<text class="ts" x="574" y="120" text-anchor="middle">store</text>

<!-- ONLINE SECTION container -->
<rect x="40" y="158" width="600" height="420" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th" x="56" y="182" fill="#2C2C2A">Online: navigation</text>

<!-- Camera frame -->
<rect x="131" y="198" width="132" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="197" y="220" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Camera frame</text>

<line x1="197" y1="242" x2="197" y2="266" class="arr" marker-end="url(#arrow)"/>

<!-- CosPlace retrieval → Graph localization -->
<rect x="110" y="268" width="174" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="197" y="290" text-anchor="middle" dominant-baseline="central" fill="#0C447C">CosPlace retrieval</text>

<rect x="348" y="268" width="174" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="435" y="290" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Graph localization</text>

<line x1="284" y1="290" x2="346" y2="290" class="arr" marker-end="url(#arrow)"/>
<line x1="197" y1="312" x2="197" y2="336" class="arr" marker-end="url(#arrow)"/>

<!-- A* shortest path → Next waypoint -->
<rect x="118" y="338" width="158" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="197" y="360" text-anchor="middle" dominant-baseline="central" fill="#0C447C">A* shortest path</text>

<rect x="348" y="338" width="140" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="418" y="360" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Next waypoint</text>

<line x1="276" y1="360" x2="346" y2="360" class="arr" marker-end="url(#arrow)"/>
<line x1="197" y1="382" x2="197" y2="406" class="arr" marker-end="url(#arrow)"/>

<!-- SuperGlue match → Relative heading -->
<rect x="122" y="408" width="150" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="197" y="430" text-anchor="middle" dominant-baseline="central" fill="#0C447C">SuperGlue match</text>

<rect x="348" y="408" width="158" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="427" y="430" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Relative heading</text>

<line x1="272" y1="430" x2="346" y2="430" class="arr" marker-end="url(#arrow)"/>
<line x1="197" y1="452" x2="197" y2="476" class="arr" marker-end="url(#arrow)"/>

<!-- Motor control → Stuck recovery -->
<rect x="128" y="478" width="138" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="197" y="500" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Motor control</text>

<rect x="348" y="478" width="142" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="419" y="500" text-anchor="middle" dominant-baseline="central" fill="#712B13">Stuck recovery</text>

<line x1="266" y1="500" x2="346" y2="500" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="306" y="490" text-anchor="middle">if needed</text>

<!-- Legend -->
<circle cx="68" cy="600" r="5" fill="#5DCAA5"/>
<text class="ts" x="80" y="604">Offline processing</text>
<circle cx="210" cy="600" r="5" fill="#85B7EB"/>
<text class="ts" x="222" y="604">Core pipeline</text>
<circle cx="330" cy="600" r="5" fill="#AFA9EC"/>
<text class="ts" x="342" y="604">Output / estimate</text>
<circle cx="475" cy="600" r="5" fill="#F0997B"/>
<text class="ts" x="487" y="604">Recovery</text>
</svg>
